name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          # Build from source with the repo's Go toolchain. Prebuilt binaries
          # lag the latest Go and refuse to run against this module's go 1.26
          # directive ("built with go1.24 < targeted 1.26").
          install-mode: goinstall

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint charts/logsmith-connector

      - name: helm template smoke test
        run: |
          helm template logsmith-connector charts/logsmith-connector \
            --set server=tunnel.logsmith.ai:8443 \
            --set token=dummy-token > /dev/null
