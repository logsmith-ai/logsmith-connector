apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logsmith-connector.fullname" . }}
  labels:
    {{- include "logsmith-connector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "logsmith-connector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "logsmith-connector.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: connector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --server
            - {{ .Values.server | quote }}
            - --token
            - $(LOGSMITH_TOKEN)
            {{- if .Values.insecure }}
            - --insecure
            {{- end }}
          env:
            - name: LOGSMITH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "logsmith-connector.secretName" . }}
                  key: {{ include "logsmith-connector.secretKey" . }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
