# GoReleaser configuration for logsmith-connector.
# Docs: https://goreleaser.com
version: 2

project_name: logsmith-connector

before:
  hooks:
    - go mod tidy

builds:
  - id: logsmith-connector
    main: ./cmd/logsmith-connector
    binary: logsmith-connector
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Multi-arch Docker images pushed to GitHub Container Registry.
# Per-arch builds (each context has the binary at its root, matching the
# Dockerfile's `COPY logsmith-connector`), stitched into one manifest list.
dockers:
  - id: amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/logsmith-ai/logsmith-connector"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/logsmith-ai/logsmith-connector"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}"
    image_templates:
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-amd64"
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-arm64"
  - name_template: "ghcr.io/logsmith-ai/logsmith-connector:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-amd64"
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-arm64"
  - name_template: "ghcr.io/logsmith-ai/logsmith-connector:latest"
    image_templates:
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-amd64"
      - "ghcr.io/logsmith-ai/logsmith-connector:{{ .Version }}-arm64"

release:
  github:
    owner: logsmith-ai
    name: logsmith-connector
  draft: false
  prerelease: auto
